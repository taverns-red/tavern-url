name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Test
        run: go test ./... -count=1 -race -coverprofile=coverage.out

      - name: Coverage Gate
        run: |
          # Calculate coverage excluding generated template files
          COVERAGE=$(go tool cover -func=coverage.out | grep -v '_templ.go' | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excl. templates): ${COVERAGE}%"
          # Fail if below 60% (will be ratcheted up as tests are added)
          if (( $(echo "$COVERAGE < 15" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 15% minimum"
            exit 1
          fi

      - name: Build
        run: go build -o tavern ./cmd/tavern/

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

